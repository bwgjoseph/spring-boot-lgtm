groups:
  - name: sandbox_alerts
    rules:
      # 1. Service Down Alert (Detects absence of metrics - used when replicas = 0)
      - alert: InstanceAbsent
        expr: absent(up{service_name="spring-boot-app"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance spring-boot-app is ABSENT"
          description: "Prometheus is not receiving any metrics for spring-boot-app. The deployment might be scaled to 0 or Alloy cannot reach it."

      # 2. Service Unhealthy Alert (Detects up == 0 - used when pod is running but scrape fails)
      - alert: InstanceDown
        expr: up{service_name="spring-boot-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is DOWN"
          description: "The pod {{ $labels.pod }} is running but the metrics endpoint is returning an error."

      # 3. High CPU Usage (> 80%)
      - alert: HighCpuUsage
        expr: sum(rate(container_cpu_usage_seconds_total{service_name="spring-boot-app"}[5m])) by (pod, namespace) > 0.8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on pod {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is using more than 80% CPU."

      # 4. Pokemon API High Error Rate
      - alert: PokemonApiHighErrorRate
        expr: sum(rate(pokemon_controller_seconds_count{outcome="SERVER_ERROR"}[5m])) / sum(rate(pokemon_controller_seconds_count[5m])) * 100 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on Pokemon API"
          description: "Error rate is {{ $value }}% over the last 5 minutes."

      # 5. Pokemon API High Latency
      - alert: PokemonApiHighLatency
        expr: histogram_quantile(0.99, sum(rate(pokemon_controller_seconds_bucket[5m])) by (le)) * 1000 > 2000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on Pokemon API"
          description: "P99 latency is {{ $value }}ms over the last 5 minutes."
