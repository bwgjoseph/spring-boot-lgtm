server:
  # CRITICAL: Allow Alloy to push metrics via remote_write
  extraArgs:
    enable-feature: "remote-write-receiver"
  
  persistentVolume:
    enabled: true
    size: 20Gi # Local disk storage for lean setup

# Disable components we don't need for a simple setup
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false
prometheus-node-exporter:
  enabled: true # Keep this to see node health in Grafana