server:
  # Setting to true might help the chart correctly manage the flags
  remoteWriteReceiver: true
  
  # Set retention period
  retention: "14d"
  
  # Prometheus server command-line flags
  # Leave empty to let the chart manage mandatory flags and avoid duplicates
  extraArgs: {}
  
  # Prometheus configuration file contents
  config:
    rule_files:
      - /etc/config/rules/*.yaml
    alerting:
      alertmanagers:
        - kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_namespace]
              action: keep
              regex: monitoring
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              action: keep
              regex: alertmanager
            - source_labels: [__meta_kubernetes_pod_container_port_number]
              action: keep
              regex: "9093"
        
  persistentVolume:
    enabled: true
    size: 20Gi

extraConfigmapMounts:
  - name: prometheus-rules
    mountPath: /etc/config/rules
    configMap: prometheus-rules
    readOnly: true

# Enable/Disable components
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'null-receiver'
    receivers:
      - name: 'null-receiver'

prometheus-pushgateway:
  enabled: false
prometheus-node-exporter:
  enabled: true
  hostRootFsMount:
    enabled: false
kube-state-metrics:
  enabled: true
