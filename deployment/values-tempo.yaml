tempo:
  replicas: 1
  # The 'all' target is the monolithic mode
  extraArgs:
    target: all
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  
  # Enable OTLP ingestion specifically for Alloy to talk to it
  ingestion:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"

  # Fix "empty ring" error by enabling metrics generator in monolithic mode
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://prometheus-server.monitoring.svc/api/v1/write"
    # Configuration for the generator ring
    ring:
      kvstore:
        store: inmemory

# Ensure the overrides allow metrics generation
tempoConfig:
  overrides:
    metrics_generator_processors: [service-graphs, span-metrics]

persistence:
  enabled: true
  size: 20Gi
