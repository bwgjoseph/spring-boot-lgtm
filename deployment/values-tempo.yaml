tempo:
  replicas: 1
  extraArgs:
    target: all
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
  ingestion:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
  
  # Metrics Generator Configuration
  metricsGenerator:
    enabled: true
    # Use the flat structure as per the chart's values.yaml
    remoteWriteUrl: "http://prometheus-server.monitoring.svc:80/api/v1/write"
    processor:
      service_graphs:
        wait: 10s
        max_items: 10000
      span_metrics:
        enable_target_info: true
    storage:
      path: "/tmp/tempo"
      remote_write:
        - url: "http://prometheus-server.monitoring.svc:80/api/v1/write"
    ring:
      kvstore:
        store: inmemory

  # Explicitly enable processors via overrides
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics
  
  persistence:
    enabled: true
    size: 20Gi
