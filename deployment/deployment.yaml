apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
  namespace: monitoring
  labels:
    app: spring-boot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
      annotations:
        # These annotations help Alloy/Prometheus find the metrics
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app
          image: observability:demo
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # 1. TRACING CONFIG: Point to Alloy's OTLP gRPC port
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: "http://alloy:4317"
            - name: MANAGEMENT_OTLP_TRACING_TRANSPORT
              value: "grpc"
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: "1.0"

            # 2. METRICS CONFIG: Enable OTLP push (optional if using scrape)
            # Since we chose 'Scrape', we ensure Prometheus registry is active
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
            
            # 3. APP METADATA: Important for correlation in Grafana
            - name: OTEL_SERVICE_NAME
              value: "spring-boot-app"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.namespace=monitoring"

          # Probes for K8s health management
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-app-svc
  namespace: monitoring
spec:
  selector:
    app: spring-boot-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080