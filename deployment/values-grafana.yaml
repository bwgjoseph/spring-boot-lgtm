datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.monitoring.svc:80
        isDefault: true
        jsonData:
          httpMethod: POST
          exemplarTraceIdDestinations:
            - datasourceUid: 'tempo'
              name: 'trace_id'

      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.monitoring.svc
        jsonData:
          derivedFields:
            - datasourceUid: 'tempo'
              name: 'TraceID'
              matcherRegex: '(?:traceId|trace_id|traceid|\[.+?,)([a-f0-9]{32})'
              url: '$${__value.raw}'
              urlDisplayLabel: 'View Trace'

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.monitoring.svc:3200
        jsonData:
          # Standard Traces to Logs configuration (V2)
          # Automatic filtering handles the traceId search
          tracesToLogsV2:
            datasourceUid: 'loki'
            filterByTraceID: true
            filterBySpanID: false
            lokiSearch: true
            tags:
              - key: 'service.name'
                value: 'service_name'
            spanStartTimeShift: '-5s'
            spanEndTimeShift: '5s'
          
          # Trace to Metrics (Service Map)
          tracesToMetrics:
            datasourceUid: 'prometheus'
            spanAttributes:
              - key: 'service.name'
                value: 'service_name'
          
          serviceMap:
            datasourceUid: 'prometheus'
          nodeGraph:
            enabled: true

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL
    folder: /var/lib/grafana/dashboards/default
