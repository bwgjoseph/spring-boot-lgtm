server:
  persistentVolume:
    enabled: true
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  retention: "14d"
  config:
    rule_files:
      - /etc/config/alerting_rules.yml

extraVolumes:
  - name: extra-rules
    configMap:
      name: prometheus-alert-rules

extraVolumeMounts:
  - name: extra-rules
    mountPath: /etc/config/alerting_rules.yml
    subPath: prometheus-alerting-rules.yaml
    readOnly: true

alertmanager:
  enabled: true
  persistentVolume:
    enabled: true
    size: 10Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'null-receiver'
    receivers:
      - name: 'null-receiver'
