# Official MinIO Helm Chart Configuration
mode: standalone
replicas: 1
drivesPerNode: 1

rootUser: "admin"
rootPassword: "password123"

# Persistence settings
persistence:
  enabled: true
  size: 50Gi

# Create buckets on startup
buckets:
  - name: loki
    policy: public
    purge: false
  - name: tempo
    policy: public
    purge: false

# Resource limits for sandbox
resources:
  requests:
    memory: 256Mi
    cpu: 100m

# Service configuration
service:
  type: ClusterIP
  port: 9000

# Console configuration
consoleService:
  type: ClusterIP
  port: 9001
