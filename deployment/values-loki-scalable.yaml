# Loki Simple Scalable Configuration
deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  
  storage:
    type: s3
    s3:
      endpoint: minio.monitoring.svc:9000
      access_key_id: admin
      secret_access_key: password123
      s3ForcePathStyle: true
      insecure: true
    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h


  # Explicitly set memberlist configuration to use Kubernetes service discovery
  memberlist:
    join_members:
      - loki-gateway-7d79b54759-rb6ph.loki-gateway.monitoring.svc.cluster.local:7946 # Explicitly join the running gateway pod
    discovery:
      k8s:
        enabled: false # Disable K8s discovery

# Separation of Read/Write paths
write:
  replicas: 1
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

read:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

backend:
  replicas: 1
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

gateway:
  image:
    repository: nginxinc/nginx-unprivileged
    tag: 1.29-alpine
  resources:
    requests:
      cpu: 5m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 64Mi
  # Anti-affinity rule to ensure gateway pods are spread across nodes
  # This is a common setting to ensure HA for critical components.
  # For single-node clusters (like Docker Desktop KinD), this may cause pods to be Pending.
  podAntiAffinity:
    enabled: false

# For the memcached cache components, explicitly set images and versions
chunksCache:
  image:
    repository: memcached
    tag: 1.6.41-alpine # Explicitly setting the version
  allocatedMemory: 256
resultsCache:
  image:
    repository: memcached
    tag: 1.6.41-alpine # Explicitly setting the version
  allocatedMemory: 256
