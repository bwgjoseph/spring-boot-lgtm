version: '3'

vars:
  NAMESPACE: monitoring
  DEPLOY_DIR: deployment
  # HELM CHART VERSIONS (Stable as of March 2026)
  VER_ALLOY: "1.8.0"
  VER_GRAFANA: "12.1.1"
  VER_LOKI: "13.2.3"
  VER_TEMPO: "2.0.0"
  VER_PROMETHEUS: "29.2.1"
  VER_MINIO: "5.4.0"
  VER_MONGODB: "18.6.31"

tasks:
  # --- INFRASTRUCTURE REPOS ---
  repos:
    desc: Add and update Helm repositories
    cmds:
      - helm repo add grafana https://grafana.github.io/helm-charts
      - helm repo add grafana-community https://grafana-community.github.io/helm-charts
      - helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      - helm repo add minio https://charts.min.io/
      - helm repo update

  namespace:
    desc: Create the monitoring namespace if it doesn't exist
    cmds:
      - kubectl create namespace {{.NAMESPACE}} --dry-run=client -o yaml > namespace.yaml
      - kubectl apply --server-side -f namespace.yaml
      - rm namespace.yaml

  # --- INDIVIDUAL COMPONENTS ---
  minio:
    desc: Install or Upgrade MinIO (Internal Object Storage)
    deps: [repos, namespace]
    cmds:
      - helm upgrade --install minio minio/minio -n {{.NAMESPACE}} --version {{.VER_MINIO}} -f {{.DEPLOY_DIR}}/values-minio.yaml

  dashboards:
    desc: Create ConfigMap for local dashboards
    deps: [namespace]
    cmds:
      - kubectl create configmap local-dashboards --from-file={{.DEPLOY_DIR}}/dashboards -n {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl label configmap local-dashboards grafana_dashboard=1 -n {{.NAMESPACE}} --overwrite

  datasources:
    desc: Create ConfigMap for local datasources
    deps: [namespace]
    cmds:
      - kubectl create configmap local-datasources --from-file={{.DEPLOY_DIR}}/datasources.yaml -n {{.NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl label configmap local-datasources grafana_datasource=1 -n {{.NAMESPACE}} --overwrite

  alloy:
    desc: Install or Upgrade Grafana Alloy
    deps: [repos, namespace]
    cmds:
      - helm upgrade --install alloy grafana/alloy -n {{.NAMESPACE}} --version {{.VER_ALLOY}} -f {{.DEPLOY_DIR}}/values-alloy.yaml

  grafana:
    desc: Install or Upgrade Grafana
    deps: [repos, namespace]
    cmds:
      - helm upgrade --install grafana grafana-community/grafana -n {{.NAMESPACE}} --version {{.VER_GRAFANA}} -f {{.DEPLOY_DIR}}/values-grafana.yaml

  loki:
    desc: Install or Upgrade Loki
    deps: [repos, namespace]
    cmds:
      - helm upgrade --install loki grafana-community/loki -n {{.NAMESPACE}} --version {{.VER_LOKI}} -f {{.DEPLOY_DIR}}/values-loki-singlebinary.yaml

  tempo:
    desc: Install or Upgrade Tempo
    deps: [repos, namespace]
    cmds:
      - helm upgrade --install tempo grafana-community/tempo -n {{.NAMESPACE}} --version {{.VER_TEMPO}} -f {{.DEPLOY_DIR}}/values-tempo.yaml

  prometheus:
    desc: Install or Upgrade Prometheus
    deps: [repos, namespace]
    cmds:
      - helm upgrade --install prometheus prometheus-community/prometheus -n {{.NAMESPACE}} --version {{.VER_PROMETHEUS}} -f {{.DEPLOY_DIR}}/values-prometheus.yaml

  mongodb:
    desc: Install or Upgrade MongoDB ReplicaSet (Bitnami OCI)
    deps: [namespace]
    cmds:
      - helm upgrade --install mongodb oci://registry-1.docker.io/bitnamicharts/mongodb -n {{.NAMESPACE}} --version {{.VER_MONGODB}} -f {{.DEPLOY_DIR}}/values-mongodb.yaml

  # --- APPLICATION TASKS ---
  app:build:
    desc: Build the Spring Boot application and Docker image using Jib
    cmds:
      - .\\mvnw clean compile jib:dockerBuild

  app:load:
    desc: Build and sideload the image into local Kubernetes (Docker Desktop/Kind)
    deps: [app:build]
    cmds:
      - docker save spring-boot-app:demo -o spring-boot-app.tar
      - docker cp spring-boot-app.tar desktop-control-plane:/spring-boot-app.tar
      - docker exec desktop-control-plane ctr -n k8s.io images import /spring-boot-app.tar
      - docker exec desktop-control-plane rm /spring-boot-app.tar
      - pwsh -Command "if (Test-Path spring-boot-app.tar) { Remove-Item spring-boot-app.tar }"

  app:deploy:
    desc: Deploy the Spring Boot application to Kubernetes
    deps: [namespace]
    cmds:
      - kubectl apply -f {{.DEPLOY_DIR}}/deployment.yaml
      - kubectl rollout restart deployment spring-boot-app -n {{.NAMESPACE}}

  # --- COMPOSITE TASKS ---
  infra:
    desc: Install/Upgrade all infrastructure components (LGTM + Alloy + Storage + DB)
    cmds:
      - task: minio
      - task: mongodb
      - task: prometheus
      - task: loki
      - task: tempo
      - task: grafana
      - task: dashboards
      - task: datasources
      - task: alloy

  all:
    desc: Run a full installation/upgrade (Infra + App)
    cmds:
      - task: infra
      - task: app:load
      - task: app:deploy

  # --- UTILITY TASKS ---
  port-forward:
    desc: Port-forward all observability UIs (Grafana:3000, Prometheus:9090, Alertmanager:9093, Alloy:12345)
    cmds:
      - kubectl port-forward service/grafana 3000:80 -n {{.NAMESPACE}} &
      - kubectl port-forward service/prometheus-server 9090:80 -n {{.NAMESPACE}} &
      - kubectl port-forward service/prometheus-alertmanager 9093:9093 -n {{.NAMESPACE}} &
      - kubectl port-forward daemonset/alloy 12345:12345 -n {{.NAMESPACE}} &
      - kubectl port-forward service/spring-boot-app-svc 8080:8080 -n {{.NAMESPACE}} &
      - echo "Port-forwards started in background."
      - echo "Grafana Admin Password:"
      - task: password

  password:
    desc: Get the Grafana admin password
    cmds:
      - kubectl get secret --namespace {{.NAMESPACE}} grafana -o jsonpath="{.data.admin-password}" | base64 --decode ; echo

  clean:
    desc: Remove the monitoring namespace and all its resources
    cmds:
      - kubectl delete namespace {{.NAMESPACE}} --ignore-not-found

  # --- VERIFICATION TASKS ---
  test:e2e:
    desc: Run end-to-end observability verification
    cmds:
      - pwsh -File ./verification/run-all.ps1
