# MinIO Helm Chart values.yaml for Production Deployment

# Deploy MinIO in distributed mode for High Availability
mode: "distributed"

# Number of MinIO server instances (replicas) for distributed mode.
# For erasure coding, a minimum of 4 is recommended.
replicas: 4

# Namespace where MinIO will be deployed.
namespace: "monitoring"

# Persistence configuration for MinIO's data.
persistence:
  enabled: true
  # Using the confirmed StorageClass for MinIO's persistent volumes.
  # Ensure 'nfs-storage' is a valid StorageClass in your Kubernetes cluster.
  storageClass: "nfs-storage" 
  # Initial estimated size for MinIO's persistent volumes.
  # This is a guideline and may need adjustment based on actual data growth.
  size: "15Ti" 

# Credentials management. We will rely on Kubernetes Secrets.
# The Helm chart can create secrets, or you can pre-create them.
# This configuration assumes you will create a Kubernetes secret named 'minio-credentials'
# with keys 'accesskey' and 'secretkey'.
credentials:
  accessKeySecret:
    name: minio-credentials # Name of the Kubernetes secret to create/use
    key: accesskey           # Key within the secret for the access key
  secretKeySecret:
    name: minio-credentials # Name of the Kubernetes secret to create/use
    key: secretkey           # Key within the secret for the secret key

# TLS configuration for MinIO access.
# Using self-signed certificates, managed via Kubernetes Secrets.
tls:
  enabled: true
  # Setting autoGeneratedCerts to true will make the Helm chart attempt to generate
  # self-signed certificates and store them in a Kubernetes Secret named 'minio-tls-secret'.
  autoGeneratedCerts: true
  # If you pre-create a TLS secret named 'my-minio-tls-secret', you would use:
  # secretName: "my-minio-tls-secret" 

# Service configuration.
# Expose MinIO service internally within the cluster.
service:
  type: ClusterIP # Standard for internal service access
  # Using an internal Kubernetes DNS name for the domain.
  # This is suitable for internal cluster communication.
  domain: "minio.monitoring.svc.cluster.local" 

# You might also need to configure network policies to restrict access to MinIO.
# Example:
# networkPolicy:
#   enabled: true
#   ingress:
#     - from:
#         - namespaceSelector: {} # Allow ingress from all namespaces for now, refine as needed
#           podSelector: {}
#     - ports:
#         - protocol: TCP
#           port: 9000
#         - protocol: TCP
#           port: 9001 # For console access if enabled

# Define resource requests and limits for MinIO pods for production.
# Adjust these based on your cluster's capacity and expected load.
resources:
  requests:
    cpu: "1"
    memory: "8Gi"
  limits:
    cpu: "4"
    memory: "16Gi"
