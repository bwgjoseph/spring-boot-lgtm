alloy:
  # Deploying Alloy as a DaemonSet ensures collection agents on each node.
  # HA for central collection/gateway functionality would be handled by backend services (Loki, Tempo, Prometheus).
  # The current DaemonSet approach for collection is retained.

  # For production, it's recommended to manage certificates for secure communication.
  # Assuming that your production environment has TLS certificates configured for
  # Loki, Prometheus, and Tempo endpoints.
  # The following are placeholders and would need to be configured with actual
  # service endpoints and potentially TLS cert paths if not using default service account CA.

  configMap:
    create: true
    content: |
      // --- LOGS: DISCOVERY & RELABELING ---
      discovery.kubernetes "all_pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.all_pods.targets
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name", "__meta_kubernetes_pod_label_app"]
          separator     = ";"
          regex         = "^(?:;*)([^;]+).*$"
          replacement   = "$1"
          target_label  = "service_name"
        }
      }

      loki.source.kubernetes "logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.extract_metadata.receiver]
      }

      // Production Loki endpoint - replace with your actual production Loki service URL
      loki.write "production" {
        endpoint {
          url = "https://loki.example.com/loki/api/v1/push" # Production Loki URL (use HTTPS)
        }
      }

      // Metadata Extraction: Promote trace_id and span_id to structured metadata
      loki.process "extract_metadata" {
        forward_to = [loki.write.production.receiver]

        stage.regex {
          // Matches standard Spring Boot MDC format: [app,traceId,spanId]
          expression = ".*\[(?P<app>.+?), (?P<trace_id>\w+), (?P<span_id>\w+)\].*"
        }

        stage.structured_metadata {
          values = {
            "trace_id" = "",
            "span_id"  = "",
          }
        }
      }

      // --- METRICS: PROMETHEUS SCRAPING ---
      prometheus.scrape "spring_boot" {
        targets = discovery.relabel.pod_logs.output
        metrics_path = "/actuator/prometheus"
        forward_to = [prometheus.remote_write.production.receiver]
      }

      // Self-monitoring: Scraping Alloy's own metrics
      prometheus.scrape "alloy" {
        targets = [{"__address__" = "localhost:12345"}]
        forward_to = [prometheus.remote_write.production.receiver]
      }

      // Production Prometheus endpoint - replace with your actual production Prometheus service URL
      prometheus.remote_write "production" {
        endpoint {
          url = "http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write" # Production Prometheus URL (use HTTPS)
        }
      }

      // --- TRACES: OTLP INGESTION & PROCESSING ---
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" } # Listen on all interfaces for gRPC
        output {
          traces  = [otelcol.processor.tail_sampling.production.input]
          metrics = [otelcol.exporter.otlp.tempo.input] # Tempo exporter for metrics if needed, usually not for traces
        }
      }

      // Tail-based Sampling for Production: Keep all errors, sample 10% of successful requests.
      // Adjust sampling_percentage as needed for cost/utility balance.
      otelcol.processor.tail_sampling "production" {
        policy {
          name = "sample-errors"
          type = "status_code"
          status_code { status_codes = ["ERROR"] }
        }
        policy {
          name = "probabilistic-sample-successful"
          type = "probabilistic"
          probabilistic { sampling_percentage = 10.0 } # Adjust this percentage for production
        }
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      // Production Tempo endpoint - replace with your actual production Tempo service URL
      // Ensure TLS is configured for production
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "http://tempo.monitoring.svc.cluster.local:4317" # Production Tempo URL (use HTTPS and port if TLS is enabled)
          tls {
            # In production, configure CA certificates for verification.
            # If Tempo uses self-signed certs or specific CA, provide paths here.
            # Example: insecure = false; ca_file = "/path/to/ca.crt"
            insecure = false # IMPORTANT: Set to false for production and configure CA
            # ca_file = "/path/to/your/tempo_ca.crt" # Uncomment and set path if needed
          }
        }
      }

      // --- K8S CLUSTER MONITORING: DISCOVERY ---

      // Discovery for Node Exporter and Kubelet
      discovery.kubernetes "nodes" {
        role = "node"
      }

      // Discovery for Kube-State-Metrics service
      discovery.kubernetes "services" {
        role = "service"
      }

      // --- K8S CLUSTER MONITORING: SCRAPING ---

      discovery.relabel "cadvisor" {
        targets = discovery.kubernetes.nodes.targets
        rule {
          action = "replace"
          source_labels = ["id"]
          regex = "^/kubepods/(?:.+)/pod([^/]+)/.+$"
          target_label = "pod_uid"
        }
        rule {
          action = "replace"
          source_labels = ["id"]
          regex = "^/kubepods/(?:.+)/pod[^/]+/([^/]+)$"
          target_label = "container"
        }
      }

      // Filter to only the KSM service
      discovery.relabel "ksm" {
        targets = discovery.kubernetes.services.targets
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          regex = "prometheus-kube-state-metrics"
          action = "keep"
        }
      }

      // Filter to only the Node Exporter service
      discovery.relabel "node_exporter" {
        targets = discovery.kubernetes.services.targets
        rule {
          source_labels = ["__meta_kubernetes_service_name"]
          regex = "prometheus-node-exporter"
          action = "keep"
        }
      }

      // Scrape cAdvisor for per-container CPU/Memory metrics
      // FOR PRODUCTION: Configure proper CA verification instead of insecure_skip_verify
      prometheus.scrape "cadvisor" {
        targets = discovery.relabel.cadvisor.output
        scheme = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = false # IMPORTANT: Set to false for production
          # ca_file = "/path/to/your/kubelet_ca.crt" # Uncomment and set path if needed
        }
        metrics_path = "/metrics/cadvisor"
        forward_to = [prometheus.remote_write.production.receiver]
      }

      // Scrape Kubelet for node health
      // FOR PRODUCTION: Configure proper CA verification instead of insecure_skip_verify
      prometheus.scrape "kubelet" {
        targets = discovery.kubernetes.nodes.targets
        scheme = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          ca_file = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          insecure_skip_verify = false # IMPORTANT: Set to false for production
          # ca_file = "/path/to/your/kubelet_ca.crt" # Uncomment and set path if needed
        }
        forward_to = [prometheus.remote_write.production.receiver]
      }

      // Scrape Kube-State-Metrics (Object state like Deployment health)
      prometheus.scrape "kube_state_metrics" {
        targets    = discovery.relabel.ksm.output
        forward_to = [prometheus.remote_write.production.receiver]
      }

      // Scrape Node Exporter (Hardware metrics)
      prometheus.scrape "node_exporter" {
        targets    = discovery.relabel.node_exporter.output
        forward_to = [prometheus.remote_write.production.receiver]
      }

  controller:
    type: daemonset
