# Production configuration for Grafana
# User has requested 1 replica, deviating from general HA recommendation for small team use.
# Assumes an existing PostgreSQL instance and Kubernetes Secrets for credentials.

grafana:
  # User requested 1 replica for Grafana for a small team setup.
  # Note: This deviates from the general HA recommendation in production_ready.md.
  replicas: 1 

  # Disable default SQLite persistence as we will use an external PostgreSQL database.
  persistence:
    enabled: false

  # Admin password placeholder. It's recommended to manage this via Kubernetes Secrets.
  adminPassword: "YOUR_STRONG_GRAFANA_ADMIN_PASSWORD" # IMPORTANT: Replace with a strong password or use a secret.

  # Plugins - Configuration for air-gapped/on-premise environments:
  # In environments without internet access, plugins must be manually downloaded and installed.
  # Process:
  # 1. On a machine WITH internet, download plugin archives (.tar.gz) from Grafana.com/plugins.
  #    Example: For 'grafana-polystore-datasource', download its release archive.
  # 2. Transfer the downloaded archives to your air-gapped environment.
  # 3. Manually extract plugin archives into the Grafana plugins directory within the container
  #    (e.g., /var/lib/grafana/plugins/). You might need to exec into the Grafana pod
  #    or pre-bake a custom Grafana image with plugins installed.
  # 4. Ensure the plugin ID is listed here for Grafana to recognize it if the chart supports it.
  plugins:
    - "grafana-polystore-datasource" # Example: useful for querying multiple data sources
    - "grafana-worldmap-panel"      # Example: common visualization plugin
    # Add other essential plugins as needed. For air-gapped installs, the plugin must be manually placed in the plugin directory.
    # This list entry ensures Grafana knows the plugin ID, but the installation is manual.

  # --- EXTERNAL POSTGRESQL CONFIGURATION ---
  # Using placeholders for connection details. These should be managed via Kubernetes Secrets.
  externalDatabase:
    type: postgres
    host: "placeholder-postgres-host.svc.cluster.local" # Replace with your PostgreSQL service host
    port: 5432
    user: "placeholder-grafana-user"                 # Replace with your PostgreSQL username for Grafana
    password: "placeholder-grafana-password"         # IMPORTANT: Replace with reference to Kubernetes Secret
    database: "placeholder-grafana-db"               # Replace with your PostgreSQL database name
    # Example for referencing Kubernetes Secrets for credentials:
    # password:
    #   valueFrom:
    #     secretKeyRef:
    #       name: grafana-db-secrets # Your Kubernetes Secret name
    #       key: password           # The key within the secret holding the password
  
  # Ensure resources are adequate for production, though with 1 replica, it might be less demanding.
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

  # --- DATASOURCE PROVISIONING ---
  # Datasources are provisioned via sidecar as requested.
  # Ensure these configurations point to production-ready endpoints.
  # The 'datasources.yaml' content below is an example of how it might be structured.
  datasources:
    datasources.yaml: |
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          url: "https://loki.example.com" # Replace with your production Loki URL
          access: proxy # or direct, depending on network
          isDefault: false
          jsonData:
            derivedFields:
              - datasourceName: "Loki" # For linking logs to traces in Grafana
                matcherRegex: "traceID=(?P<traceID>\w+)"
                url: "${LOKI_URL}" # Use Grafana's internal variable for Loki URL
        
        - name: Tempo
          type: tempo
          url: "http://tempo.monitoring.svc.cluster.local:3200" # K8s friendly service URL
          access: proxy
          isDefault: false
          jsonData:
            tracesToLogs:
              - datasources:
                  - name: Loki
                    regex: "traceID=(?P<traceID>\w+)"
              - datasources:
                  - name: Prometheus # If Tempo has Prometheus integration for exemplars
                    regex: "traceID=(?P<traceID>\w+)"
        
        - name: Prometheus
          type: prometheus
          url: "http://prometheus.monitoring.svc.cluster.local:9090" # K8s friendly service URL
          access: proxy
          isDefault: false
          jsonData:
            # Example: Exemplar configuration to link to Tempo traces
            exemplar:
              enabled: true
              # If using Loki as the trace storage and configured for exemplar correlation
              # query: '{job="your-loki-job", traceID="$traceID"}' # Adjust query as needed

# --- INGRESS AND SECURITY ---
# Ingress configuration is typically handled at the Ingress Controller level.
# Ensure Grafana is exposed via an Ingress with TLS termination.

