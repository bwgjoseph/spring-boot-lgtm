# Production configuration for Prometheus
# Assumes MinIO is deployed for long-term metrics storage.
# Assumes Alertmanager will be deployed or configured.

server:
  # Enable Alloy to push metrics via remote_write
  remoteWriteReceiver: true
  
  # Set retention period
  retention: "90d" # 90 days retention
  
  # Prometheus server command-line flags
  # Leave empty to let the chart manage mandatory flags and avoid duplicates
  extraArgs: {}

  # Remote Write Configuration: Pointing to MinIO for long-term storage.
  # NOTE: This assumes MinIO is configured to accept Prometheus remote_write API.
  # The endpoint has been updated to a Kubernetes-friendly format.
  # Remember to replace 'http://minio.monitoring.svc.cluster.local:9000/prometheus/write'
  # with your actual MinIO endpoint and credentials once MinIO is deployed.
  remoteWrite:
    - url: "http://minio.monitoring.svc.cluster.local:9000/prometheus/write" # Updated to K8s internal service URL
      # Optional: Add SigV4 authentication if MinIO requires it
      # sigv4:
      #   region: "us-east-1" # Adjust region as per MinIO configuration
      #   access_key_id: "YOUR_MINIO_ACCESS_KEY"
      #   secret_access_key: "YOUR_MINIO_SECRET_KEY"
      
  # Persistent Volume for Prometheus TSDB data (for operational data and short-term storage)
  persistentVolume:
    enabled: true
    size: 50Gi # Increased size for operational data and potential local caches

  # Adjust resources for production load
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  # Prometheus configuration file contents
  config:
    rule_files:
      - /etc/config/alerting_rules.yml
    # Explicitly point Prometheus to the Alertmanager service
    alerting:
      alertmanagers:
        - kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_namespace]
              action: keep
              regex: monitoring
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              action: keep
              regex: alertmanager
            - source_labels: [__meta_kubernetes_pod_container_port_number]
              action: keep
              regex: "9093"

# Define Alerting Rules
serverFiles:
  alerting_rules.yml:
    groups:
      - name: production_alerts
        rules:
          # 1. Service Down Alert (Detects absence of metrics - used when replicas = 0)
          - alert: InstanceAbsent
            expr: absent(up{service_name="spring-boot-app"})
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Instance spring-boot-app is ABSENT"
              description: "Prometheus is not receiving any metrics for spring-boot-app. The deployment might be scaled to 0 or Alloy cannot reach it."

          # 2. Service Unhealthy Alert (Detects up == 0 - used when pod is running but scrape fails)
          - alert: InstanceDown
            expr: up{service_name="spring-boot-app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Instance {{ $labels.instance }} is DOWN"
              description: "The pod {{ $labels.pod }} is running but the metrics endpoint is returning an error."

          # 3. High CPU Usage (> 80%)
          - alert: HighCpuUsage
            expr: sum(rate(container_cpu_usage_seconds_total{service_name="spring-boot-app"}[5m])) by (pod, namespace) > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on pod {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is using more than 80% CPU."

# Enable and configure Alertmanager for production alerting.
# Alertmanager handles deduplication, grouping, silencing, and routing of alerts from Prometheus.
alertmanager:
  enabled: true
  # Alertmanager configuration details. This block defines how alerts are grouped, routed,
  # and where they are sent.
  # Fixed: Converted from multi-line string to a YAML object to meet chart schema requirements.
  config:
    # Global configuration options for Alertmanager.
    global:
      # How long to wait before sending a notification about a resolved alert.
      resolve_timeout: 5m

    # The root of the routing tree. Alerts with no specific route match will end up here.
    route:
      # Labels by which alerts should be grouped. Alerts with identical values for these labels
      # will be batched into a single notification.
      # Recommended for comprehensive grouping: ['alertname', 'cluster', 'service', 'namespace'].
      group_by: ['alertname', 'cluster', 'service', 'namespace'] 
      
      # Duration to wait to buffer alerts of the same group before sending an initial notification.
      # Allows bundling multiple related alerts into one message.
      group_wait: 30s 
      
      # Duration to wait before sending a notification for new alerts added to an existing group
      # that has already been notified. Prevents alert storms for ongoing incidents.
      group_interval: 5m 
      
      # How often to re-send a notification if an alert is still firing.
      repeat_interval: 4h 
      
      # The default receiver for alerts that do not match any specific routes.
      # This is set to 'mattermost-receiver' to send all alerts to Mattermost.
      receiver: 'mattermost-receiver' 

    # List of receivers for alerts.
    receivers:
      - name: 'mattermost-receiver'
        # Configuration for sending alerts via webhook, suitable for Mattermost.
        webhook_configs:
          # This URL is a placeholder. Replace it with your actual Mattermost incoming webhook URL.
          # Ensure Mattermost is accessible from your Kubernetes cluster, or configure external access.
          - url: 'http://mattermost.example.com/hooks/generic-mattermost-webhook-placeholder' 
            # Send a notification when an alert transitions from firing to resolved.
            send_resolved: true 

# Note: Alerting rules (the conditions that trigger alerts, e.g., CPU > 90%) are typically
# defined separately in Prometheus's configuration, often via additional ConfigMaps or
# Prometheus Operator CRDs, not directly in this Helm chart values.yaml.

# Enable Node Exporter with hostRootFsMount for production disk monitoring
prometheus-node-exporter:
  enabled: true
  hostRootFsMount:
    enabled: true # Enable for production to monitor host disk usage

# Enable Kube-State-Metrics
kube-state-metrics:
  enabled: true

# Note on HA for Prometheus:
# The above configuration sets up a single Prometheus instance with remote write to MinIO.
# For true HA, consider:
# 1. Deploying multiple Prometheus instances with identical scrape configurations and remote write targets.
# 2. Using a Prometheus Operator with a highly available setup.
# 3. Integrating with a federated setup or a remote storage solution like Thanos/Cortex if extreme scale is needed.
# This configuration focuses on essential production features like retention, remote storage, and Alertmanager for a single instance, assuming backend services (like MinIO for storage) contribute to overall system HA.
