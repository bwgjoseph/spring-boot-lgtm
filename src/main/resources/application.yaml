spring:
  application:
    name: spring-boot-observability
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  prometheus:
    metrics:
      export:
        enabled: true
        # Essential for Day 2: Allow Prometheus to scrape exemplars (links metrics to traces)
        exemplars:
          enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        # P99 latencies for HTTP, MongoDB, and External API calls
        http.server.requests: true
        mongodb.command: true
        http.client.requests: true
  tracing:
    sampling:
      # Keep 100% at the app level; Alloy's tail sampling will handle the reduction
      probability: 1.0
  observations:
    key-values:
      application: spring-boot-observability
  otlp:
    tracing:
      endpoint: http://localhost:4317
      transport: grpc
    metrics:
      export:
        enabled: false

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"