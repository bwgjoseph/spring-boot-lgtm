spring:
  application:
    name: spring-boot-app
  data:
    mongodb:
      # Disable MongoDB to stop connection errors in sandbox
      enabled: false
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  prometheus:
    metrics:
      export:
        enabled: true
        # Essential for Day 2: Allow Prometheus to scrape exemplars (links metrics to traces)
        exemplars:
          enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        # P99 latencies for HTTP, MongoDB, and External API calls
        http.server.requests: true
        mongodb.command: true
        http.client.requests: true
  tracing:
    sampling:
      # Keep 100% at the app level; Alloy's tail sampling will handle the reduction
      probability: 1.0
    # Crucial: Ensure traceId/spanId are put into MDC
    propagation:
      produce: [w3c]
      consume: [w3c]
    # In newer Spring Boot, this explicitly enables MDC correlation
    enabled: true
  otlp:
    metrics:
      export:
        enabled: false
logging:
  pattern:
    # Check for traceId, trace_id, and their span counterparts
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  include-application-name: false