spring:
  application:
    name: spring-boot-app
  data:
    mongodb:
      enabled: true
      uri: mongodb://root:password@localhost:27017/kx?authSource=admin
debezium:
  properties:
    connector.class: io.debezium.connector.mongodb.MongoDbConnector
    mongodb.connection.string: mongodb://admin:password@localhost:27017/source?authSource=admin&replicaSet=mgrs
    topic.prefix: kx-connector
    offset.storage: org.apache.kafka.connect.storage.FileOffsetBackingStore
    offset.storage.file.filename: /tmp/offsets.dat
    # For MongoDB, capturing everything in the kx database
    database.include.list: kx
    # Allow the engine to start even if it cannot connect immediately (useful for sandbox)
    errors.retry.delay.initial.ms: 1000
    errors.retry.delay.max.ms: 5000
management:
  endpoints:
    web:
      exposure:
        include: "*"
  prometheus:
    metrics:
      export:
        enabled: true
        # Essential for Day 2: Allow Prometheus to scrape exemplars (links metrics to traces)
        exemplars:
          enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        # P99 latencies for HTTP, MongoDB, and External API calls
        http.server.requests: true
        mongodb.command: true
        http.client.requests: true
  tracing:
    sampling:
      # Keep 100% at the app level; Alloy's tail sampling will handle the reduction
      probability: 1.0
    # Crucial: Ensure traceId/spanId are put into MDC
    propagation:
      produce: [w3c]
      consume: [w3c]
    # In newer Spring Boot, this explicitly enables MDC correlation
    enabled: true
    baggage:
      # These travel across service boundaries
      remote-fields:
        - userId
      # These are synced to the SLF4J MDC
      correlation:
        fields:
          - userId
  otlp:
    metrics:
      export:
        enabled: false
logging:
  pattern:
    # Using camelCase for traceId and spanId as indicated by user and common for Micrometer Tracing Bridge
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{userId:-}]"
  include-application-name: false